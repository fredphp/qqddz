# Admin后台管理系统配置 - 生产环境
# 域名: houtais.hongxiu88.com

site:
  name: "棋牌游戏后台管理系统"
  logo: ""
  favicon: ""
  description: "专业的棋牌游戏运营管理平台"
  keywords: "棋牌游戏,斗地主,后台管理"

autocode:
  web: web/src
  root: /opt/qqddz/admin
  server: server
  module: github.com/flipped-aurora/gin-vue-admin/server

mysql:
  path: 127.0.0.1
  port: "3306"
  db-name: hlddz
  username: root
  password: "root"
  config: charset=utf8mb4&parseTime=True&loc=Local
  log-mode: error
  max-idle-conns: 10
  max-open-conns: 100

db-list:
  - type: mysql
    alias-name: hlddz
    prefix: ""
    port: "3306"
    config: charset=utf8mb4&parseTime=True&loc=Local
    db-name: hlddz
    username: root
    password: "root"
    path: 127.0.0.1
    log-mode: error
    max-idle-conns: 10
    max-open-conns: 100
    disable: false
  - type: mysql
    alias-name: ddz-game
    prefix: ""
    port: "3306"
    config: charset=utf8mb4&parseTime=True&loc=Local
    db-name: ddz_game
    username: root
    password: "root"
    path: 127.0.0.1
    log-mode: error
    max-idle-conns: 10
    max-open-conns: 100
    disable: false

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0

redis-list:
  - name: cache
    addr: 127.0.0.1:6379
    password: ""
    db: 0
    useCluster: false

jwt:
  signing-key: "hongxiu88-ddz-jwt-secret-key-2024-secure"
  expires-time: 7d
  buffer-time: 1d
  issuer: qqddz

system:
  db-type: mysql
  oss-type: local
  addr: 8888
  iplimit-count: 15000
  iplimit-time: 3600
  use-multipoint: false
  use-redis: true
  use-mongo: false
  use-strict-auth: false
  disable-auto-migrate: true
  game-server-api-url: http://127.0.0.1:1781

cors:
  mode: allow-all

zap:
  level: info
  prefix: '[qqddz-admin]'
  format: console
  director: log
  encode-level: LowercaseColorLevelEncoder
  stacktrace-key: stacktrace
  show-line: true
  log-in-console: true
  retention-day: -1

local:
  path: uploads/file
  store-path: uploads/file

captcha:
  key-long: 6
  img-width: 240
  img-height: 80
  open-captcha: 9999
  open-captcha-timeout: 3600
